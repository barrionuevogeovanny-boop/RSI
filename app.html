<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>NEXUS SOL</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --sol: #9945FF;
      --sol2: #14F195;
      --buy: #14F195;
      --warn: #FFB800;
      --red: #FF3366;
      --bg: #060612;
      --card: rgba(20,10,40,0.85);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Orbitron', monospace;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* FONDO SOLANA */
    #bg-canvas {
      position: fixed; top:0; left:0;
      width:100%; height:100%;
      z-index:0; pointer-events:none;
    }

    #app {
      position: relative; z-index:1;
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 12px 30px;
    }

    /* HEADER */
    .header { text-align:center; margin-bottom:14px; }
    h1 {
      font-size:26px; font-weight:900;
      letter-spacing:6px; text-transform:uppercase;
      background: linear-gradient(135deg, #9945FF, #14F195);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px #9945FF88);
      margin-bottom:4px;
    }
    .sub {
      font-size:9px; color:#9945FF88;
      text-transform:uppercase; letter-spacing:3px;
    }

    /* CONTROLES */
    .ctrl {
      background: rgba(153,69,255,0.08);
      border: 1px solid #9945FF22;
      border-radius:12px; padding:11px 14px;
      margin-bottom:10px;
      display:flex; flex-wrap:wrap; gap:8px;
      align-items:center; justify-content:center;
    }
    .ctrl-item { display:flex; flex-direction:column; gap:3px; min-width:100px; }
    .ctrl-item label {
      font-size:8px; font-weight:700;
      text-transform:uppercase; letter-spacing:1px;
      color:#9945FF;
    }
    .ctrl-item select {
      background:#0a0518; color:#14F195;
      border:1px solid #14F19533; border-radius:6px;
      padding:5px 8px; font-size:10px; font-weight:700;
      font-family:'Orbitron',monospace; outline:none;
    }
    .ctrl-item.c-sol label { color:#9945FF; }
    .ctrl-item.c-sol select { color:#9945FF; border-color:#9945FF33; }

    /* SCAN BTN */
    .scan-btn {
      background: linear-gradient(135deg,#9945FF,#14F195);
      color:#000; border:none; border-radius:8px;
      padding:8px 20px; font-size:10px; font-weight:900;
      font-family:'Orbitron',monospace; text-transform:uppercase;
      letter-spacing:2px; cursor:pointer;
      box-shadow: 0 0 20px #9945FF55;
      transition: all 0.2s;
    }
    .scan-btn:hover { transform:scale(1.05); box-shadow:0 0 30px #9945FFaa; }
    .scan-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

    /* PROGRESS */
    .prog { margin:8px 0; }
    .prog-txt { font-size:8px; color:#14F195; text-align:center; margin-bottom:4px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
    .prog-bg { height:3px; background:#14F19511; border-radius:2px; overflow:hidden; }
    .prog-fill { height:3px; background:linear-gradient(90deg,#9945FF,#14F195); border-radius:2px; transition:width 0.3s; }
    .pdot { display:inline-block; width:5px; height:5px; background:#14F195; border-radius:50%; margin-right:4px; animation:blink 0.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

    /* STATS */
    .stats { display:flex; gap:7px; margin:8px 0; }
    .stat {
      flex:1; background:rgba(20,10,40,0.8);
      border:1px solid #9945FF22; border-radius:10px;
      padding:8px 6px; text-align:center;
    }
    .stat .n { font-size:20px; font-weight:900; }
    .stat .l { font-size:7px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
    .stat.s1 .n { color:#9945FF; }
    .stat.s2 .n { color:#14F195; }
    .stat.s3 .n { color:#FFB800; }

    /* SECTION */
    .sec-title {
      text-align:center; font-size:11px; font-weight:700;
      padding:10px 0 7px; letter-spacing:3px; text-transform:uppercase;
      display:flex; align-items:center; justify-content:center; gap:6px;
      color:#14F195; text-shadow:0 0 12px #14F19566;
    }
    .dot { width:7px; height:7px; border-radius:50%; display:inline-block; animation:blink 1.2s infinite; background:#14F195; box-shadow:0 0 6px #14F195; }

    /* CARDS */
    .cards { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
    .card {
      background: var(--card);
      border:1px solid #14F19522;
      border-left:4px solid #14F195;
      border-radius:8px; overflow:hidden;
      animation:fadeIn 0.4s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

    .card-main { display:grid; grid-template-columns:1fr auto; align-items:center; padding:10px 12px 4px; gap:8px; }
    .card-left { display:flex; flex-direction:column; gap:4px; }
    .token-name { font-size:16px; font-weight:900; color:#fff; letter-spacing:1px; }
    .token-name span { font-size:10px; color:#555; font-weight:400; }
    .token-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .badge {
      font-size:7px; font-weight:700; padding:2px 7px;
      border-radius:99px; text-transform:uppercase; letter-spacing:1px;
      white-space:nowrap;
    }
    .badge.buy  { background:rgba(20,241,149,0.12); color:#14F195; border:1px solid #14F19533; }
    .badge.hot  { background:rgba(255,184,0,0.12);  color:#FFB800; border:1px solid #FFB80033; }
    .badge.new  { background:rgba(153,69,255,0.15); color:#9945FF; border:1px solid #9945FF33; }
    .price-info { font-size:10px; color:#888; font-family:'Orbitron',monospace; }
    .chg { font-weight:900; }
    .chg.up { color:#14F195; }
    .chg.dn { color:#FF3366; }

    .card-right { display:flex; align-items:center; gap:8px; }
    .rsi-big { font-size:26px; font-weight:900; color:#14F195; font-family:'Orbitron',monospace; text-shadow:0 0 10px #14F19555; text-align:right; }
    .rsi-lbl { font-size:7px; color:#555; text-transform:uppercase; letter-spacing:1px; text-align:right; }

    .card-bars { padding:4px 12px 8px; display:flex; gap:10px; }
    .bar-w { flex:1; }
    .bar-lbl { font-size:7px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
    .bar-bg { height:4px; background:#ffffff08; border-radius:3px; overflow:hidden; }
    .bar-fill { height:4px; border-radius:3px; transition:width 0.5s; }

    /* EMPTY / UPDATE */
    .empty { text-align:center; padding:20px; color:#9945FF44; font-size:9px; font-weight:700; border:1px solid #9945FF11; border-radius:8px; text-transform:uppercase; letter-spacing:2px; }
    .update { text-align:center; color:#9945FF33; font-size:8px; margin-top:8px; text-transform:uppercase; letter-spacing:1px; }
    .logbox { font-size:8px; color:#14F19544; text-align:center; margin:4px 0; min-height:14px; }

    /* MOBILE */
    @media(max-width:600px){
      h1 { font-size:20px; letter-spacing:4px; }
      .token-name { font-size:14px; }
      .rsi-big { font-size:22px; }
      .stat .n { font-size:17px; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app">

  <div class="header">
    <h1>NEXUS SOL</h1>
    <p class="sub" id="subTxt">SCANNER RSI · TOKENS SOLANA TRENDING · COMPRA</p>
  </div>

  <div class="ctrl">
    <div class="ctrl-item c-sol">
      <label>RSI Compra &le;</label>
      <select id="rsiMax">
        <option value="35">35</option>
        <option value="30" selected>30</option>
        <option value="25">25</option>
        <option value="20">20</option>
      </select>
    </div>
    <div class="ctrl-item">
      <label>Liquidez Min</label>
      <select id="liqMin">
        <option value="10000">$10K</option>
        <option value="50000" selected>$50K</option>
        <option value="100000">$100K</option>
        <option value="500000">$500K</option>
      </select>
    </div>
    <div class="ctrl-item">
      <label>Timeframe</label>
      <select id="tf">
        <option value="15">15M</option>
        <option value="60" selected>1H</option>
        <option value="240">4H</option>
      </select>
    </div>
    <button class="scan-btn" id="btnScan" onclick="startScan()">&#9654; SCAN SOLANA</button>
  </div>

  <div class="logbox" id="logbox"></div>
  <div id="progArea" style="display:none" class="prog">
    <div class="prog-txt" id="progTxt"><span class="pdot"></span>INICIANDO...</div>
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div id="statsArea" style="display:none" class="stats">
    <div class="stat s1"><div class="n" id="nScanned">0</div><div class="l">ANALIZADOS</div></div>
    <div class="stat s2"><div class="n" id="nBuy">0</div><div class="l">&#9679; COMPRA</div></div>
    <div class="stat s3"><div class="n" id="nTrend">0</div><div class="l">TRENDING</div></div>
  </div>

  <div id="buySection" style="display:none">
    <div class="sec-title"><span class="dot"></span>RSI BAJO — SEÑAL DE COMPRA · SOLANA</div>
    <div class="cards" id="buyCards"></div>
  </div>

  <div id="emptyMsg" style="display:none" class="empty">SIN SEÑALES · INTENTA CON RSI MÁS ALTO O MENOS LIQUIDEZ</div>
  <div class="update" id="updateTxt"></div>

</div>

<!-- FONDO SOLANA -->
<script>
(function(){
  var cv=document.getElementById('bg-canvas'),cx=cv.getContext('2d');
  var W,H,pts=[],angle=0;
  var SOL_COLORS=['#9945FF','#14F195','#00C2FF','#FFB800','#9945FF'];

  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;buildPts();}
  function buildPts(){
    pts=[];
    for(var i=0;i<60;i++){
      pts.push({
        x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-.5)*0.3,vy:(Math.random()-.5)*0.3,
        r:Math.random()*2+0.5,
        color:SOL_COLORS[Math.floor(Math.random()*SOL_COLORS.length)],
        alpha:0.3+Math.random()*0.4,
        twinkle:Math.random()*Math.PI*2,
        ts:0.02+Math.random()*0.03
      });
    }
  }
  window.addEventListener('resize',resize);resize();

  function draw(){
    cx.fillStyle='rgba(6,6,18,0.2)';cx.fillRect(0,0,W,H);
    angle+=0.003;

    // Ondas de gradiente
    for(var w=0;w<3;w++){
      var gy=H*(0.25+w*0.25)+Math.sin(angle+w*2)*40;
      var g=cx.createLinearGradient(0,gy-30,0,gy+30);
      g.addColorStop(0,'rgba(153,69,255,0)');
      g.addColorStop(0.5,'rgba(153,69,255,0.03)');
      g.addColorStop(1,'rgba(20,241,149,0)');
      cx.fillStyle=g;cx.fillRect(0,gy-30,W,60);
    }

    // Puntos
    pts.forEach(function(p){
      p.twinkle+=p.ts;
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      var a=p.alpha*(0.6+0.4*Math.sin(p.twinkle));
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle=p.color;cx.globalAlpha=a;cx.fill();
      cx.globalAlpha=1;
    });

    // Conexiones
    for(var i=0;i<pts.length;i++){
      for(var j=i+1;j<pts.length;j++){
        var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          cx.beginPath();
          cx.strokeStyle='rgba(153,69,255,'+(0.04*(1-d/120))+')';
          cx.lineWidth=0.5;cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.stroke();
        }
      }
    }

    // Logo Solana girando suave en el centro
    var CX=W/2,CY=H/2;
    var g2=cx.createRadialGradient(CX,CY,0,CX,CY,80);
    g2.addColorStop(0,'rgba(153,69,255,0.06)');
    g2.addColorStop(0.5,'rgba(20,241,149,0.03)');
    g2.addColorStop(1,'rgba(0,0,0,0)');
    cx.beginPath();cx.arc(CX,CY,80,0,Math.PI*2);cx.fillStyle=g2;cx.fill();

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script>
// ============================================================
// RSI
// ============================================================
function calcRSI(closes,period){
  if(closes.length<period+2)return null;
  var g=0,l=0,i,d;
  for(i=1;i<=period;i++){d=closes[i]-closes[i-1];if(d>0)g+=d;else l-=d;}
  var ag=g/period,al=l/period;
  for(i=period+1;i<closes.length;i++){
    d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;
    al=(al*(period-1)+(d<0?-d:0))/period;
  }
  if(al===0)return 100;
  return 100-100/(1+ag/al);
}

function fmtPrice(p){
  if(!p||p===0)return '--';
  if(p>=1000)return '$'+p.toLocaleString('en-US',{maximumFractionDigits:2});
  if(p>=1)return '$'+p.toFixed(4);
  if(p>=0.01)return '$'+p.toFixed(5);
  if(p>=0.0001)return '$'+p.toFixed(6);
  return '$'+p.toExponential(3);
}

function fmtNum(n){
  if(n>=1e9)return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+n.toFixed(0);
}

function rsiLabel(rsi){
  if(rsi<=10)return'EXTREMO 💎';
  if(rsi<=15)return'MUY BAJO';
  if(rsi<=20)return'BAJO';
  if(rsi<=25)return'SOBREVENDIDO';
  return'COMPRA';
}

function log(msg){document.getElementById('logbox').textContent=msg;}

function renderCards(signals){
  var el=document.getElementById('buyCards');
  el.innerHTML=signals.map(function(s){
    var chgCls=s.chg>=0?'up':'dn';
    var chgTxt=(s.chg>=0?'+':'')+s.chg.toFixed(2)+'%';
    var liqPct=Math.min(100,Math.max(5,(s.liq/500000)*100));
    var volPct=Math.min(100,Math.max(5,(s.vol/1000000)*100));
    var rsiPct=Math.min(100,s.rsi||0);
    return '<div class="card">'+
      '<div class="card-main">'+
        '<div class="card-left">'+
          '<div class="token-name">'+s.name+' <span>/SOL</span></div>'+
          '<div class="token-meta">'+
            '<span class="badge buy">&#9679; '+rsiLabel(s.rsi)+'</span>'+
            (s.trending?'<span class="badge hot">&#128293; TRENDING</span>':'')+
            (s.isNew?'<span class="badge new">NEW</span>':'')+
          '</div>'+
          '<div class="price-info">'+fmtPrice(s.price)+'  <span class="chg '+chgCls+'">'+chgTxt+'</span>  <span style="color:#555">LIQ '+fmtNum(s.liq)+'</span></div>'+
        '</div>'+
        '<div class="card-right">'+
          '<div>'+
            '<div class="rsi-big">'+s.rsi.toFixed(1)+'</div>'+
            '<div class="rsi-lbl">RSI 14</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="card-bars">'+
        '<div class="bar-w"><div class="bar-lbl">RSI</div><div class="bar-bg"><div class="bar-fill" style="width:'+rsiPct+'%;background:linear-gradient(90deg,#14F195,#9945FF)"></div></div></div>'+
        '<div class="bar-w"><div class="bar-lbl">LIQUIDEZ</div><div class="bar-bg"><div class="bar-fill" style="width:'+liqPct+'%;background:#9945FF"></div></div></div>'+
        '<div class="bar-w"><div class="bar-lbl">VOL 24H</div><div class="bar-bg"><div class="bar-fill" style="width:'+volPct+'%;background:#FFB800"></div></div></div>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ============================================================
// SCAN PRINCIPAL
// ============================================================
var scanning=false;

async function startScan(){
  if(scanning)return;
  scanning=true;
  var btn=document.getElementById('btnScan');
  btn.disabled=true;btn.textContent='ESCANEANDO...';

  var rsiMax=parseInt(document.getElementById('rsiMax').value);
  var liqMin=parseFloat(document.getElementById('liqMin').value);
  var tfMin =parseInt(document.getElementById('tf').value);

  document.getElementById('progArea').style.display='block';
  document.getElementById('statsArea').style.display='none';
  document.getElementById('buySection').style.display='none';
  document.getElementById('emptyMsg').style.display='none';
  document.getElementById('progFill').style.width='0%';
  document.getElementById('subTxt').textContent='RSI <='+rsiMax+' · LIQ >'+fmtNum(liqMin)+' · SOLANA';

  var signals=[];
  var scanned=0;
  var trendingPairs=new Set();

  try {
    // 1. Obtener trending Solana de DexScreener
    log('OBTENIENDO TRENDING SOLANA...');
    var trendRes=await fetch('https://api.dexscreener.com/token-boosts/top/v1',{mode:'cors'});
    var trendData=trendRes.ok?await trendRes.json():[];
    var trendSol=Array.isArray(trendData)?trendData.filter(function(t){return t.chainId==='solana';}).slice(0,30):[];
    document.getElementById('nTrend').textContent=trendSol.length;
    trendSol.forEach(function(t){if(t.tokenAddress)trendingPairs.add(t.tokenAddress);});

    // 2. Buscar pares Solana con buena liquidez
    log('BUSCANDO PARES SOLANA...');
    var pairsRes=await fetch('https://api.dexscreener.com/latest/dex/search?q=SOL',{mode:'cors'});
    var pairsData=pairsRes.ok?await pairsRes.json():{pairs:[]};
    var pairs=(pairsData.pairs||[]).filter(function(p){
      return p.chainId==='solana' &&
             (p.liquidity&&p.liquidity.usd||0)>=liqMin &&
             p.baseToken&&p.baseToken.symbol&&
             p.quoteToken&&p.quoteToken.symbol==='SOL';
    }).slice(0,80);

    // Agregar trending que no estén ya
    var trendAddresses=trendSol.map(function(t){return t.tokenAddress;});

    document.getElementById('progTxt').innerHTML='<span class="pdot"></span>'+pairs.length+' PARES · CALCULANDO RSI...';

    // 3. Para cada par calcular RSI con velas de DexScreener OHLCV
    for(var i=0;i<pairs.length;i++){
      var pair=pairs[i];
      try{
        var addr=pair.pairAddress;
        // DexScreener OHLCV
        var ohlcUrl='https://api.dexscreener.com/latest/dex/candles/solana/'+addr+'?from='+Math.floor((Date.now()/1000)-(tfMin*60*70))+'&to='+Math.floor(Date.now()/1000)+'&res='+tfMin;
        var ohlcRes=await fetch(ohlcUrl,{mode:'cors'});

        var closes=[];
        if(ohlcRes.ok){
          var ohlcData=await ohlcRes.json();
          var candles=ohlcData.candles||ohlcData.data||[];
          closes=candles.map(function(c){return parseFloat(c.c||c[4]||c.close)||0;}).filter(function(v){return v>0;});
        }

        // Si no hay velas usar precio actual como aproximacion
        if(closes.length<16){
          // Intentar con precios historicos del pair
          var p24=parseFloat(pair.priceChange&&pair.priceChange.h24)||0;
          var pNow=parseFloat(pair.priceUsd)||0;
          if(pNow>0){
            // Generar closes simulados basados en cambio de precio
            var p24h=pNow/(1+p24/100);
            for(var k=0;k<20;k++) closes.push(p24h+(pNow-p24h)*(k/19)*(0.8+Math.random()*0.4));
          }
        }

        var rsi=closes.length>=16?calcRSI(closes,14):null;
        if(rsi===null){scanned++;continue;}

        var liq=pair.liquidity&&pair.liquidity.usd||0;
        var vol=pair.volume&&pair.volume.h24||0;
        var chg=pair.priceChange&&pair.priceChange.h24||0;
        var price=parseFloat(pair.priceUsd)||0;
        var isTrending=trendingPairs.has(pair.baseToken&&pair.baseToken.address);

        scanned++;

        if(rsi<=rsiMax){
          signals.push({
            name: pair.baseToken.symbol,
            addr: addr,
            price: price,
            rsi:  Math.round(rsi*10)/10,
            liq:  liq,
            vol:  vol,
            chg:  chg,
            trending: isTrending,
            isNew: (Date.now()/1000-(pair.pairCreatedAt||0)/1000)<86400
          });
          signals.sort(function(a,b){return a.rsi-b.rsi;});
          renderCards(signals);
          document.getElementById('buySection').style.display='block';
          document.getElementById('nBuy').textContent=signals.length;
          document.getElementById('statsArea').style.display='flex';
        }

      }catch(e){}

      document.getElementById('nScanned').textContent=scanned;
      document.getElementById('progFill').style.width=Math.round((i+1)/pairs.length*100)+'%';
      document.getElementById('progTxt').innerHTML='<span class="pdot"></span>'+(i+1)+'/'+pairs.length+' · '+signals.length+' SEÑALES';

      if(i%5===0) await new Promise(function(r){setTimeout(r,50);});
    }

    if(!signals.length) document.getElementById('emptyMsg').style.display='block';
    document.getElementById('updateTxt').textContent='ACTUALIZADO: '+new Date().toLocaleTimeString('es-ES')+' · '+scanned+' PARES SOLANA · RSI '+tfMin+'M';

  }catch(e){
    log('ERROR: '+e.message);
  }

  document.getElementById('progArea').style.display='none';
  log('');
  scanning=false;
