name: Nexus RSI Scanner

on:
  schedule:
    - cron: '*/5 * * * *'   # Cada 5 minutos, 24/7
  workflow_dispatch:          # También se puede correr manualmente

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run RSI Scanner
        run: node scanner.js

      - name: Commit and push signals.json
        run: |
          git config --global user.email "nexus-bot@github.com"
          git config --global user.name "Nexus RSI Bot"
          git add signals.json
          git diff --staged --quiet || git commit -m "RSI scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
